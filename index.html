<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f6d36b">
    <meta name="description" content="Causerie is a judgment-free French speaking partner for daily reps.">
    <title>Causerie</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/assets/icon.svg">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="#home" aria-label="Causerie home">
          <span class="brand-mark">C</span>
          <span>
            <strong>Causerie</strong>
            <small>Daily French speaking reps</small>
          </span>
        </a>
        <button class="ghost-button" id="delete-data-button" type="button">Delete data</button>
      </header>

      <main id="app" tabindex="-1"></main>

      <nav class="tabbar" aria-label="Primary navigation">
        <a href="#home" data-route="home">Home</a>
        <a href="#scenarios" data-route="scenarios">Scenarios</a>
        <a href="#conversation" data-route="conversation">Speak</a>
        <a href="#debrief" data-route="debrief">Debrief</a>
      </nav>
    </div>

    <template id="toast-template">
      <output class="toast" role="status"></output>
    </template>

    <script type="module" src="/src/app.js"></script>
  </body>
</html>
